services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: mcollector
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d mcollector"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    restart: unless-stopped
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-cluster.sh cluster-id --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion:
    build:
      context: ../../apps/api
      dockerfile: src/Ingestion.Api/Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=mcollector;Username=app;Password=app
      - Jwt__Secret=supersecret_and_long_jwt_secret_key_12345!
      - RESEND_APITOKEN=re_123456789

      - Kafka__BootstrapServers=kafka:29092
      - AllowedOrigins=http://localhost:3000,http://localhost:8000,http://localhost:8001,http://localhost:5003,http://127.0.0.1:8000,http://127.0.0.1:8001,http://127.0.0.1:5500,http://127.0.0.1:3000,http://127.0.0.1:5003

  analytics:
    build:
      context: ../../apps/api
      dockerfile: src/Analytics.Api/Dockerfile
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=mcollector;Username=app;Password=app
      - Jwt__Secret=supersecret_and_long_jwt_secret_key_12345!
      - RESEND_APITOKEN=re_123456789

      - Kafka__BootstrapServers=kafka:29092
      - AllowedOrigins=http://localhost:3000,http://localhost:8000,http://localhost:8001,http://localhost:5003,http://127.0.0.1:8000,http://127.0.0.1:8001,http://127.0.0.1:5500,http://127.0.0.1:3000,http://127.0.0.1:5003

  identity:
    build:
      context: ../../apps/api
      dockerfile: src/Identity.Api/Dockerfile
    ports:
      - "5003:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=mcollector;Username=app;Password=app
      - Jwt__Secret=supersecret_and_long_jwt_secret_key_12345!
      - RESEND_APITOKEN=re_123456789
      - FrontendUrl=http://127.0.0.1:8001
      - Kafka__BootstrapServers=kafka:29092
      - AllowedOrigins=http://localhost:3000,http://localhost:8000,http://localhost:8001,http://localhost:5003,http://127.0.0.1:8000,http://127.0.0.1:8001,http://127.0.0.1:5500,http://127.0.0.1:3000,http://127.0.0.1:5003

  processor:
    build:
      context: ../../apps/api
      dockerfile: src/EventProcessor/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=mcollector;Username=app;Password=app
      - Jwt__Secret=supersecret_and_long_jwt_secret_key_12345!
      - RESEND_APITOKEN=re_123456789

      - Kafka__BootstrapServers=kafka:29092
      - AllowedOrigins=http://localhost:3000,http://localhost:8000,http://localhost:5003,http://127.0.0.1:8000,http://127.0.0.1:5500,http://127.0.0.1:3000,http://127.0.0.1:5003

