name: Deploy Web

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Copy files to server
        run: |
          tar czf /tmp/web-deploy.tar.gz -C apps/web .
          gcloud compute scp /tmp/web-deploy.tar.gz ${{ secrets.GCE_INSTANCE }}:/tmp/web-deploy.tar.gz \
            --zone=${{ secrets.GCE_ZONE }} \
            --ssh-key-expire-after=5m

      - name: Move files into place
        run: |
          gcloud compute ssh ${{ secrets.GCE_INSTANCE }} \
            --zone=${{ secrets.GCE_ZONE }} \
            --ssh-key-expire-after=5m \
            --command="
              mkdir -p /tmp/dashboard-web-deploy &&
              tar xzf /tmp/web-deploy.tar.gz -C /tmp/dashboard-web-deploy &&
              sudo rsync -a --delete /tmp/dashboard-web-deploy/ /srv/dashboard-web/ &&
              sudo chown -R caddy:caddy /srv/dashboard-web &&
              rm -rf /tmp/dashboard-web-deploy /tmp/web-deploy.tar.gz
            "
