<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MCollector - Дашборд</title>
        <link rel="stylesheet" href="./src/css/style.css" />
    </head>
    <body>
        <div class="app-container">
            <header>
                <div class="header-start">
                    <a href="./projects.html" class="button-link">&larr; Назад к проектам</a>
                    <h1 class="app-heading">Дашборд</h1>
                </div>
                <button onclick="logout()" class="button-link">Выйти</button>
            </header>

            <main>
                <div id="loadingIndicator">Загрузка...</div>
                <div id="errorIndicator" class="error" style="display: none; margin-bottom: 20px">
                    Нет данных или ошибка соединения
                </div>

                <div id="dashboardContent" style="display: none">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <p class="label">События</p>
                            <p class="value" id="statEvents">-</p>
                        </div>
                        <div class="stat-card">
                            <p class="label">Пользователи</p>
                            <p class="value" id="statUsers">-</p>
                        </div>
                        <div class="stat-card">
                            <p class="label">Просмотры страниц</p>
                            <p class="value" id="statPageviews">-</p>
                        </div>
                    </div>

                    <h2 class="chart-container-title">События по дням</h2>
                    <div class="chart-container" id="eventsChart"></div>

                    <h2 class="chart-container-title">Пользователи по дням</h2>
                    <div class="chart-container" id="usersChart"></div>
                </div>
            </main>
        </div>

        <script src="./src/js/main.js"></script>
        <script src="./src/js/dashboard.js"></script>
    </body>
</html>
