<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCollector - Дашборд</title>
  <link rel="stylesheet" href="./src/css/style.css">
</head>
<body>
  <div class="app-container">
    <header>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <a href="./projects.html" class="button-link" style="font-size:16px;">&larr; Назад к проектам</a>
        <h1 style="margin:0;">Дашборд</h1>
      </div>
      <button onclick="logout()" class="button-link">Выйти</button>
    </header>

    <main>
      <div id="loadingIndicator">Загрузка...</div>
      <div id="errorIndicator" class="error" style="display:none; margin-bottom: 20px;">Нет данных или ошибка соединения</div>

      <div id="dashboardContent" style="display: none;">
        <div class="stats-grid">
          <div class="stat-card">
            <p class="label">События</p>
            <p class="value" id="statEvents">-</p>
          </div>
          <div class="stat-card">
            <p class="label">Пользователи</p>
            <p class="value" id="statUsers">-</p>
          </div>
          <div class="stat-card">
            <p class="label">Просмотры страниц</p>
            <p class="value" id="statPageviews">-</p>
          </div>
        </div>

        <h2 class="chart-container-title">События по дням</h2>
        <div class="chart-container" id="eventsChart">
        </div>

        <h2 class="chart-container-title">Пользователи по дням</h2>
        <div class="chart-container" id="usersChart">
        </div>
      </div>
    </main>
  </div>

  <script src="./src/js/main.js"></script>
  <script>
    const token = getToken();
    const projectId = getQueryParam('projectId');

    if (!token) {
      window.location.href = './index.html';
    }
    if (!projectId) {
      window.location.href = './projects.html';
    }

    async function loadDashboard() {
      try {
        const to = new Date().toISOString();
        const from = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
        const headers = { Authorization: `Bearer ${token}` };
        const base = `${DATA_URL}/api/analytics`;

        const [overviewRes, eventsRes, usersRes] = await Promise.all([
          fetch(`${base}/overview?projectId=${projectId}&from=${from}&to=${to}`, { headers }),
          fetch(`${base}/events/timeseries?projectId=${projectId}&from=${from}&to=${to}&interval=day`, { headers }),
          fetch(`${base}/users/timeseries?projectId=${projectId}&from=${from}&to=${to}&interval=day`, { headers }),
        ]);

        if (overviewRes.status === 401 || eventsRes.status === 401 || usersRes.status === 401) {
          logout();
          return;
        }

        if (!overviewRes.ok || !eventsRes.ok || !usersRes.ok) {
          throw new Error('Some requests failed');
        }

        const overviewData = await overviewRes.json();
        const eventsData = await eventsRes.json();
        const usersData = await usersRes.json();

        document.getElementById('statEvents').textContent = overviewData.totalEvents || 0;
        document.getElementById('statUsers').textContent = overviewData.uniqueUsers || 0;
        document.getElementById('statPageviews').textContent = overviewData.pageViews || 0;

        renderChart('eventsChart', eventsData, 'events');
        renderChart('usersChart', usersData, 'users');

      } catch (err) {
        console.error(err);
        document.getElementById('errorIndicator').style.display = 'block';
        document.getElementById('dashboardContent').style.display = 'none';
      } finally {
        document.getElementById('loadingIndicator').style.display = 'none';
        if (document.getElementById('errorIndicator').style.display !== 'block') {
          document.getElementById('dashboardContent').style.display = 'block';
        }
      }
    }

    function renderChart(containerId, timeseriesData, type) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      
      if (!timeseriesData || timeseriesData.length === 0) {
        container.innerHTML = `<p style="width:100%; text-align:center; color: #a1a1aa;">Нет данных за период</p>`;
        return;
      }

      const counts = timeseriesData.map(d => d.count || 0);
      const maxCount = Math.max(...counts, 1);

      timeseriesData.forEach(point => {
        const heightPercent = ((point.count || 0) / maxCount) * 100;
        
        const wrapper = document.createElement('div');
        wrapper.className = 'chart-bar-wrapper';

        const bar = document.createElement('div');
        bar.className = `chart-bar ${type === 'users' ? 'users' : ''}`;
        bar.style.height = `${heightPercent}%`;
        
        const tooltip = document.createElement('div');
        tooltip.className = 'tooltip';
        tooltip.textContent = `${point.count || 0}`;
        bar.appendChild(tooltip);

        const label = document.createElement('div');
        label.className = 'chart-label';
        try {
          const dateObj = new Date(point.timestamp);
          const d = dateObj.getDate().toString().padStart(2, '0');
          const m = (dateObj.getMonth() + 1).toString().padStart(2, '0');
          label.textContent = `${d}.${m}`;
        } catch {
          label.textContent = point.timestamp || '';
        }

        wrapper.appendChild(bar);
        wrapper.appendChild(label);
        container.appendChild(wrapper);
      });
    }

    loadDashboard();
  </script>
</body>
</html>
