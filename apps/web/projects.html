<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCollector - Мои проекты</title>
  <link rel="stylesheet" href="./src/css/style.css">
</head>
<body>
  <div class="page">

    <div class="header">
      <h1 class="title">Мои проекты</h1>
      <div class="userInfo">
        <button onclick="logout()" class="buttonOutline">Выйти</button>
      </div>
    </div>

    <div id="loadingContainer">
      <div class="skeletonCard"></div>
      <div class="skeletonCard" style="margin-top: 16px;"></div>
      <div class="skeletonCard" style="margin-top: 16px;"></div>
    </div>

    <div id="projectsContainer" style="display: none;">

      <p id="emptyState" class="emptyState" style="display: none;">
        У вас пока нет проектов
      </p>

      <div id="projectsGrid" class="projectsGrid"></div>

      <div class="createSection">
        <p class="createTitle">Создать новый проект</p>
        <div class="createRow">
          <input
            type="text"
            id="newProjectName"
            placeholder="Название проекта"
            class="input"
          />
          <button id="createBtn" class="button" onclick="createProject()">
            Создать
          </button>
        </div>
      </div>

    </div>
  </div>

  <div id="modalOverlay" class="modalOverlay" style="display: none;">
    <div class="modal">
      <h2 class="modalTitle">Проект создан!</h2>
      <p class="modalSubtitle">
        Установите SDK на ваш сайт чтобы начать собирать данные
      </p>

      <label class="label">Ваш API-ключ</label>
      <div class="apiKeyBox">
        <span class="apiKeyText" id="modalApiKey"></span>
        <button class="buttonSmall" id="copyBtn">Скопировать</button>
      </div>

      <label class="label">Добавьте на ваш сайт</label>
      <div class="codeBlock" id="modalSnippet"></div>

      <div class="modalButtons">
        <button class="button" id="goToDashboardBtn">Перейти в дашборд</button>
        <button class="buttonOutline" onclick="closeModal()">Закрыть</button>
      </div>
    </div>
  </div>

  <script src="./src/js/main.js"></script>
  <script>
    const token = getToken()
    if (!token) window.location.href = './index.html'

    let currentProjects = []
    let currentCreatedProject = null

    async function loadProjects() {
      try {
        const res = await fetch(`${AUTH_URL}/api/projects`, {
          headers: { Authorization: `Bearer ${token}` }
        })

        if (res.status === 401) {
          logout()
          return
        }

        const data = await res.json()
        currentProjects = data
        renderProjects()
      } catch (err) {
        console.error(err)
      } finally {
        document.getElementById('loadingContainer').style.display = 'none'
        document.getElementById('projectsContainer').style.display = 'block'
      }
    }

    function renderProjects() {
        const grid = document.getElementById('projectsGrid')
        const emptyState = document.getElementById('emptyState')

        while (grid.firstChild) grid.removeChild(grid.firstChild)

        if (currentProjects.length === 0) {
            emptyState.style.display = 'block'
            return
        }

        emptyState.style.display = 'none'

        currentProjects.forEach(proj => {
            const card = document.createElement('div')
            card.className = 'projectCard'

            const cardMain = document.createElement('div')
            cardMain.className = 'projectCardMain'
            cardMain.addEventListener('click', () => {
            window.location.href = `./dashboard.html?projectId=${proj.id}`
            })

            const nameSpan = document.createElement('span')
            nameSpan.className = 'projectName'
            nameSpan.textContent = proj.name

            const arrow = document.createElement('span')
            arrow.className = 'projectArrow'
            arrow.textContent = '→'

            cardMain.appendChild(nameSpan)
            cardMain.appendChild(arrow)

            const cardActions = document.createElement('div')
            cardActions.className = 'projectCardActions'

            const openBtn = document.createElement('button')
            openBtn.className = 'buttonSmall'
            openBtn.textContent = 'Открыть'
            openBtn.addEventListener('click', () => {
            window.location.href = `./dashboard.html?projectId=${proj.id}`
            })

            cardActions.appendChild(openBtn)

            card.appendChild(cardMain)
            card.appendChild(cardActions)
            grid.appendChild(card)
        })
        }

    function showModal(project) {
        currentCreatedProject = project

        document.getElementById('modalApiKey').textContent = project.apiKey

        const snippet = document.getElementById('modalSnippet')
        snippet.textContent = `<script>\n  analytics.init('${project.apiKey}')\n<\/script>`

        document.getElementById('goToDashboardBtn').onclick = () => {
            window.location.href = `./dashboard.html?projectId=${project.id}`
        }

        document.getElementById('modalOverlay').style.display = 'flex'
    }

    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none'
      currentCreatedProject = null
    }

    document.getElementById('copyBtn').addEventListener('click', function() {
      if (!currentCreatedProject) return
      navigator.clipboard.writeText(currentCreatedProject.apiKey)
      this.textContent = 'Скопировано ✓'
      setTimeout(() => this.textContent = 'Скопировать', 2000)
    })

    loadProjects()
  </script>
</body>
</html>
