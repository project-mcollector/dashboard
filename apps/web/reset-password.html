<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCollector - Новый пароль</title>
  <link rel="icon" href="./favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="./favicon.png">
  <link rel="stylesheet" href="./src/css/style.css">
</head>
<body>
<div class="page">
  <div class="card">
    <h1 class="title">MCollector</h1>

    <div id="invalidState" style="display: none;">
      <p class="subtitle">Неверная ссылка</p>
      <p class="link-text">
        <a href="./forgot-password.html" class="link">Запросить новую ссылку</a>
      </p>
    </div>

    <div id="successState" style="display: none;">
      <p class="subtitle">Пароль изменён</p>
      <p class="state-message">Теперь вы можете войти с новым паролем.</p>
      <p class="link-text"><a href="./index.html" class="link">Войти</a></p>
    </div>

    <div id="formState">
      <p class="subtitle">Введите новый пароль</p>
      <form id="resetForm" class="form">
        <div id="resetError" class="error"></div>

        <div>
          <label class="label" for="password">Новый пароль</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              class="input"
              required
              minlength="8"
              autofocus
              autocomplete="new-password"
            />
            <button type="button" class="password-toggle" id="togglePassword">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div id="passwordHints" class="password-hints" style="display: none;">
            <div class="hint" id="hint-length" data-text="Не менее 8 символов">○ Не менее 8 символов</div>
            <div class="hint" id="hint-lower" data-text="Строчная буква (a-z)">○ Строчная буква (a-z)</div>
            <div class="hint" id="hint-upper" data-text="Заглавная буква (A-Z)">○ Заглавная буква (A-Z)</div>
            <div class="hint" id="hint-special" data-text="Специальный символ (!@#$)">○ Специальный символ (!@#$)</div>
          </div>
        </div>

        <button type="submit" class="button" id="submitBtn">Сохранить пароль</button>

        <p class="link-text">
          <a href="./index.html" class="link">Войти</a>
        </p>
      </form>
    </div>
  </div>
</div>

<script src="./config.js"></script>
<script src="./src/js/main.js"></script>
<script src="./src/js/reset-password.js"></script>
</body>
</html>
