<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCollector - Сброс пароля</title>
    <link rel="stylesheet" href="./src/css/style.css">
</head>
<body>
<div class="page">
    <div class="card">
        <h1 class="title">Новый пароль</h1>
        <p class="subtitle">Введите ваш новый пароль</p>

        <form id="resetForm" class="form">
            <div id="resetError" class="error"></div>
            <div id="resetSuccess" class="success-message">
                Пароль успешно изменён! <a href="./index.html" class="link">Войти</a>
            </div>

            <div id="formFields">
                <div>
                    <label class="label" for="password">Новый пароль</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="••••••••"
                        class="input"
                        required
                    />
                </div>

                <button type="submit" class="button" id="submitBtn">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script src="./src/js/main.js"></script>
<script src="./src/js/reset-password.js"></script>
</body>
</html>
