<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCollector - Сброс пароля</title>
    <link rel="stylesheet" href="./src/css/style.css">
</head>
<body>
<div class="page">
    <div class="card">
        <h1 class="title">Новый пароль</h1>
        <p class="subtitle">Введите ваш новый пароль</p>

        <form id="resetForm" class="form">
            <div id="resetError" class="error"></div>
            <div id="resetSuccess" style="display:none; color:#16a34a; background:rgba(22,163,74,0.1); padding:12px; border-radius:6px; margin-bottom:16px;">
                Пароль успешно изменён! <a href="./index.html" class="link">Войти</a>
            </div>

            <div id="formFields">
                <div>
                    <label class="label" for="password">Новый пароль</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="••••••••"
                        class="input"
                        required
                    />
                </div>

                <button type="submit" class="button" id="submitBtn">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script src="./src/js/main.js"></script>
<script>
    const token = getQueryParam('token');
    const email = getQueryParam('email');

    if (!token || !email) {
        showError('resetError', 'Неверная ссылка для сброса');
        document.getElementById('formFields').style.display = 'none';
    }

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        if (!token || !email) return;

        const password = document.getElementById('password').value;
        const submitBtn = document.getElementById('submitBtn');

        hideError('resetError');
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Сохранение...';

        try {
            const res = await fetch(`${AUTH_URL}/api/auth/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, token, newPassword: password })
            });

            if (!res.ok) {
                showError('resetError', 'Ошибка при сбросе пароля');
                return;
            }

            document.getElementById('formFields').style.display = 'none';
            document.getElementById('resetSuccess').style.display = 'block';
        } catch (err) {
            showError('resetError', 'Ошибка соединения с сервером');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Сохранить';
        }
    });
</script>
</body>
</html>
