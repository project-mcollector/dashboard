<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCollector - Вход</title>
    <link rel="stylesheet" href="./src/css/style.css">
</head>
<body>
<div class="page">
    <div class="card">
        <h1 class="title">MCollector</h1>
        <p class="subtitle">Аналитика для вашего сайта</p>

        <form id="loginForm" class="form">
            <div id="loginError" class="error"></div>

            <div>
                <label class="label" for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="you@example.com"
                    class="input"
                    required
                />
            </div>

            <div>
                <label class="label" for="password">Пароль</label>
                <div class="passwordWrapper">
                    <input
                        type="password"
                        id="password"
                        placeholder="••••••••"
                        class="input"
                        required
                    />
                    <button type="button" class="passwordToggle" id="togglePassword">
                        <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="button" id="submitBtn">Войти</button>

            <p class="linkText">
                Нет аккаунта?
                <a href="./register.html" class="link">Зарегистрироваться</a>
            </p>
        </form>
    </div>
</div>

<script src="./src/js/main.js"></script>
<script>
    if (getToken()) window.location.href = './projects.html';

    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');

    const eyeOpen = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const eyeClosed = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

    toggleBtn.addEventListener('click', function() {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        toggleBtn.innerHTML = isPassword ? eyeClosed : eyeOpen;
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const submitBtn = document.getElementById('submitBtn');

        hideError('loginError');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Вход...';

        try {
            const res = await fetch(`${AUTH_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (!res.ok) {
                showError('loginError', 'Неверный email или пароль');
                return;
            }

            const data = await res.json();
            setToken(data.accessToken);
            window.location.href = './projects.html';
        } catch (err) {
            showError('loginError', 'Ошибка соединения с сервером');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Войти';
        }
    });
</script>
</body>
</html>
