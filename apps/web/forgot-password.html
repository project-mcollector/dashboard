<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCollector - Восстановление пароля</title>
  <link rel="stylesheet" href="./src/css/style.css">
</head>
<body>
<div class="page">
  <div class="card">
    <h1 class="title">Восстановление пароля</h1>
    <p class="subtitle">Введите ваш email, и мы отправим ссылку для сброса</p>

    <form id="forgotForm" class="form">
      <div id="forgotError" class="error"></div>
      <div id="forgotSuccess" class="success-message"></div>

      <div>
        <label class="label" for="email">Email</label>
        <div class="input-clear-wrapper">
          <input
            type="email"
            id="email"
            placeholder="you@example.com"
            class="input"
            required
          />
        </div>
      </div>

      <button type="submit" class="button" id="submitBtn">Отправить</button>

      <p class="link-text">
        <a href="./index.html" class="link">&larr; Вернуться ко входу</a>
      </p>
    </form>
  </div>
</div>

<script src="./src/js/main.js"></script>
<script src="./src/js/forgot-password.js"></script>
</body>
</html>
