<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCollector - Сброс пароля</title>
    <link rel="stylesheet" href="./src/css/style.css">
</head>
<body>
<div class="page">
    <div class="card">
        <h1 class="title">Восстановление пароля</h1>
        <p class="subtitle">Введите ваш email, и мы отправим ссылку для сброса</p>

        <form id="forgotForm" class="form">
            <div id="forgotError" class="error"></div>
            <div id="forgotSuccess" style="display:none; color:#16a34a; background:rgba(22,163,74,0.1); padding:12px; border-radius:6px; margin-bottom:16px;"></div>

            <div>
                <label class="label" for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="you@example.com"
                    class="input"
                    required
                />
            </div>

            <button type="submit" class="button" id="submitBtn">Отправить</button>

            <p class="linkText">
                <a href="./index.html" class="link">&larr; Вернуться ко входу</a>
            </p>
        </form>
    </div>
</div>

<script src="./src/js/main.js"></script>
<script>
    if (getToken()) window.location.href = './projects.html';

    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const submitBtn = document.getElementById('submitBtn');

        hideError('forgotError');
        document.getElementById('forgotSuccess').style.display = 'none';
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Отправка...';

        try {
            const res = await fetch(`${AUTH_URL}/api/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            if (!res.ok) {
                showError('forgotError', 'Произошла ошибка, проверьте email');
                return;
            }

            document.getElementById('forgotSuccess').textContent = 'Ссылка для сброса отправлена на ваш email';
            document.getElementById('forgotSuccess').style.display = 'block';
        } catch (err) {
            showError('forgotError', 'Ошибка соединения с сервером');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Отправить';
        }
    });
</script>
</body>
</html>
