<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCollector - Регистрация</title>
  <link rel="stylesheet" href="./src/css/style.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <h1 class="title">MCollector</h1>
      <p class="subtitle">Создайте аккаунт</p>

      <form id="registerForm" class="form">
        <div id="registerError" class="error"></div>

        <div>
          <label class="label" for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="you@example.com"
            class="input"
            required
          />
        </div>

        <div>
          <label class="label" for="organizationName">Название организации</label>
          <input
            type="text"
            id="organizationName"
            placeholder="Моя компания"
            class="input"
            required
          />
        </div>

        <div>
          <label class="label" for="password">Пароль</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            class="input"
            minlength="8"
            required
          />
        </div>

        <div>
          <label class="label" for="confirmPassword">Подтвердите пароль</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="••••••••"
            class="input"
            required
          />
        </div>

        <button type="submit" class="button" id="submitBtn">
          Зарегистрироваться
        </button>

        <p class="linkText">
          Уже есть аккаунт?
          <a href="./index.html" class="link">Войти</a>
        </p>
      </form>
    </div>
  </div>

  <script src="./src/js/main.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const organizationName = document.getElementById('organizationName').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = document.getElementById('submitBtn');
      
      hideError('registerError');
      
      if (password !== confirmPassword) {
        showError('registerError', 'Пароли не совпадают');
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Регистрация...';
      
      try {
        const res = await fetch(`${AUTH_URL}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, organizationName })
        });
        
        if (!res.ok) {
          let msg = 'Ошибка регистрации';
          try {
            const errData = await res.json();
            if (errData.errors) {
              const firstKey = Object.keys(errData.errors)[0];
              if (firstKey) msg = errData.errors[firstKey][0];
            } else if (errData.title) {
              msg = errData.title;
            }
          } catch (e) {}
          
          showError('registerError', msg);
          return;
        }
        
        const loginRes = await fetch(`${AUTH_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        if (loginRes.ok) {
          const data = await loginRes.json();
          setToken(data.accessToken);
          window.location.href = './projects.html';
        } else {
          window.location.href = './index.html';
        }
      } catch (err) {
        showError('registerError', 'Ошибка соединения с сервером');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Зарегистрироваться';
      }
    });

    if (getToken()) {
      window.location.href = './projects.html';
    }
  </script>
</body>
</html>
